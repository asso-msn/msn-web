name: Create Pull Requests from seed commands

on:
  pull_request:
  workflow_dispatch:
    inputs:
      seed_command:
        default: all

env:
  TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
  TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}

jobs:
  create_prs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: flask seed ${{ github.event.inputs.seed_command || 'all' }}
      - uses: peter-evans/create-pull-request@v8
        with:
          title: "Update from seeds: ${{ github.event.inputs.seed_command }}"
          branch: "gha-update-from-seeds-${{ github.event.inputs.seed_command }}"
          delete-branch: true
